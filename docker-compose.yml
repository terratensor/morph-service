services:
  morph-service:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: morph-service
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - REDIS_URL=redis://redis:6379/0
      - WORKERS=4
      - CACHE_TTL=3600
      - MAX_TEXT_LENGTH=100000
      - BATCH_SIZE=1000
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - morph-network
      - gmtx_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: morph-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./docker/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - morph-network
      - gmtx_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Опционально: Redis Commander для администрирования
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: morph-redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    networks:
      - morph-network
      - gmtx_net
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - dev

networks:
  gmtx_net:
    external: true
  morph-network:
    driver: bridge

volumes:
  redis-data:
    driver: local