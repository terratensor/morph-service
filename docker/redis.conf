# Максимальная память
maxmemory 256mb
maxmemory-policy allkeys-lru

# Сохранение на диск
save 900 1
save 300 10
save 60 10000

# Безопасность
requirepass ""
protected-mode no

# Производительность
tcp-keepalive 300
timeout 0
tcp-backlog 511

# Логи
loglevel notice
logfile ""

# Медленные логи
slowlog-log-slower-than 10000
slowlog-max-len 128